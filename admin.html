<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – TechZone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    <div class="nav-logo">TechZone Admin</div>
    <nav class="nav-links" id="navLinks">
        <a href="index.html">Acasă</a>
        <a href="profile.html">Profil</a>
        <a href="order.html">Comenzi</a>
    </nav>

    <div class="burger" id="burgerBtn">
        <span></span><span></span><span></span>
    </div>
</header>

<section class="admin-container">
    <h2>Panou administrare produse</h2>

    <!-- ADD PRODUCT FORM -->
    <form id="addProductForm" class="glass-card form-card">
        <h3>Adaugă produs nou</h3>

        <input type="text" id="prodName" placeholder="Denumire produs" required>
        <input type="number" id="prodPrice" placeholder="Preț (MDL)" required>
        <input type="text" id="prodImg" placeholder="Link imagine" required>
        <textarea id="prodDesc" placeholder="Descriere produs" required></textarea>

        <button type="submit" class="btn-dark">Adaugă produs</button>
    </form>

    <!-- PRODUCT LIST -->
    <h3 style="margin-top:40px;">Lista produselor</h3>
    <div id="adminProductList" class="admin-list"></div>

</section>

<script src="admin.js"></script>
<script src="app.js"></script>
</body>
</html>
