<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comandă – TechZone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    <div class="nav-logo">TechZone</div>
    <nav class="nav-links" id="navLinks">
        <a href="index.html">Acasă</a>
        <a href="profile.html">Profil</a>
        <a href="admin.html">Admin</a>
    </nav>

    <div class="burger" id="burgerBtn">
        <span></span><span></span><span></span>
    </div>
</header>


<section class="order-container">

    <div id="orderDetails" class="order-card glass-card">
        <!-- Produsul va fi încărcat din order.js -->
    </div>

    <form id="orderForm" class="glass-card order-form">

        <h3>Completează comanda</h3>

        <input type="text" id="clientName" placeholder="Nume complet" required>
        <input type="text" id="clientPhone" placeholder="Telefon" required>
        <input type="text" id="clientAddress" placeholder="Adresă livrare" required>
        <textarea id="clientNote" placeholder="Observații (opțional)"></textarea>

        <button type="submit" class="btn-dark">Plasează comanda</button>
    </form>

</section>

<script src="order.js"></script>
<script src="app.js"></script>

</body>
</html>
